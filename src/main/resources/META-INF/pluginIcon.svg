<svg width="40" height="40" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
    <!-- 第一段 0°→90°: 用不同弧长实现渐变 -->
    <path d="M 12,8 A 4,4 0 0 1 11.9,9.9" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="1.0"/>
    <path d="M 12,8 A 4,4 0 0 1 11.6,10.8" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.8"/>
    <path d="M 12,8 A 4,4 0 0 1 11.0,11.5" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.6"/>
    <path d="M 12,8 A 4,4 0 0 1 10.2,11.9" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.4"/>
    <path d="M 12,8 A 4,4 0 0 1 9.3,12.0" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.2"/>

    <!-- 第二段 90°→180°: 同理 -->
    <path d="M 8,12 A 4,4 0 0 1 6.1,11.9" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="1.0"/>
    <path d="M 8,12 A 4,4 0 0 1 5.2,11.6" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.8"/>
    <path d="M 8,12 A 4,4 0 0 1 4.5,11.0" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.6"/>
    <path d="M 8,12 A 4,4 0 0 1 4.1,10.2" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.4"/>
    <path d="M 8,12 A 4,4 0 0 1 4.0,9.3" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.2"/>

    <!-- 第三段 180°→270° -->
    <path d="M 4,8 A 4,4 0 0 1 4.1,6.1" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="1.0"/>
    <path d="M 4,8 A 4,4 0 0 1 4.4,5.2" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.8"/>
    <path d="M 4,8 A 4,4 0 0 1 5.0,4.5" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.6"/>
    <path d="M 4,8 A 4,4 0 0 1 5.8,4.1" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.4"/>
    <path d="M 4,8 A 4,4 0 0 1 6.7,4.0" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.2"/>

    <!-- 第四段 270°→360° -->
    <path d="M 8,4 A 4,4 0 0 1 9.9,4.1" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="1.0"/>
    <path d="M 8,4 A 4,4 0 0 1 10.8,4.4" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.8"/>
    <path d="M 8,4 A 4,4 0 0 1 11.5,5.0" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.6"/>
    <path d="M 8,4 A 4,4 0 0 1 11.9,5.8" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.4"/>
    <path d="M 8,4 A 4,4 0 0 1 12.0,6.7" fill="none" stroke="#40BFBF" stroke-width="2.2" stroke-opacity="0.2"/>
</svg>